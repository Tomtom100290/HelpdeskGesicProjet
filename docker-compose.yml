services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: symfony_app
    working_dir: /app
    volumes:
      - .:/app
      - cache:/app/var/cache
      - logs:/app/var/log
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql://root:helpdesk2026@database:3306/HelpdeskGesicBDD?serverVersion=mariadb-11.0.0&charset=utf8mb4
      - MERCURE_URL=http://mercure:80/.well-known/mercure
      - MERCURE_PUBLIC_URL=http://localhost:8443/.well-known/mercure
      - MERCURE_JWT_SECRET=e89ceaf739142fc3c7d182a86ed52286be4053656d17f5e9b8d68429fcae943c
      - APP_ENV=${APP_ENV:-prod}
    networks:
      - symfony

  nginx:
    image: nginx:alpine
    container_name: symfony_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/app
      - ./docker/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - symfony

  database:
    image: mariadb:11
    container_name: symfony_db
    environment:
      MARIADB_ROOT_PASSWORD: helpdesk2026
      MARIADB_DATABASE: HelpdeskGesicBDD
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - symfony

  mercure:
    image: dunglas/mercure
    container_name: symfony_mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: e89ceaf739142fc3c7d182a86ed52286be4053656d17f5e9b8d68429fcae943c
      MERCURE_SUBSCRIBER_JWT_KEY: e89ceaf739142fc3c7d182a86ed52286be4053656d17f5e9b8d68429fcae943c
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:8000 http://127.0.0.1:8000 

    command: /usr/bin/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    ports:
      - "8443:80"
    volumes:
      - mercure_data:/data
      - mercure_config:/config
    networks:
      - symfony

  mailer:
    image: axllent/mailpit
    container_name: symfony_mailer
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - symfony

volumes:
  cache:
  logs:
  db_data:
  mercure_data:
  mercure_config:

networks:
  symfony:
    driver: bridge
