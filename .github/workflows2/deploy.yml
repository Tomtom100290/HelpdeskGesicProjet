name: Déploiement production

# Se déclenche à chaque push sur la branche main
on:
  push:
    branches:
      - main
  # Permet aussi de le lancer manuellement depuis l'onglet Actions de GitHub
  workflow_dispatch:

jobs:
  deploy:
    name: Déployer sur le VPS
    runs-on: ubuntu-latest

    steps:
      - name: Connexion SSH et déploiement
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/helpdesk-app

            echo "Récupération du dernier code..."
            git pull origin main

            echo "Chargement des variables d'environnement..."
            export $(grep -v '^#' .env.prod | xargs)

            echo "Rebuild et redémarrage des conteneurs..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

            echo "Exécution des migrations..."
            docker compose -f docker-compose.prod.yml exec -T app php bin/console doctrine:migrations:migrate --no-interaction

            echo "Nettoyage du cache..."
            docker compose -f docker-compose.prod.yml exec -T app php bin/console cache:clear --env=prod

            echo "Nettoyage des anciennes images Docker inutilisées..."
            docker image prune -f

            echo "Déploiement terminé."