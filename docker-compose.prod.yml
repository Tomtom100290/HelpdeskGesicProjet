services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        APP_ENV: prod
    image: helpdesk-app:latest
    container_name: symfony_app
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MERCURE_URL=${MERCURE_URL}
      - MERCURE_PUBLIC_URL=${MERCURE_PUBLIC_URL}
      - MERCURE_JWT_SECRET=${MERCURE_JWT_SECRET}
      - APP_ENV=prod
      - APP_SECRET=${APP_SECRET}
    volumes:
      - cache:/var/www/html/var/cache
      - logs:/var/www/html/var/log
      - static_public:/var/www/html/public
    networks:
      - symfony
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: symfony_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_public:/app/public:ro
      - logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - symfony
    restart: unless-stopped

  database:
    image: mariadb:11
    container_name: symfony_db
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - symfony
    restart: unless-stopped
    # Pas de "ports:" : la base n'est joignable que depuis le réseau interne Docker

  mercure:
    image: dunglas/mercure
    container_name: symfony_mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins ${APP_PUBLIC_URL}
    command: /usr/bin/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    ports:
      - "8443:80"
    volumes:
      - mercure_data:/data
      - mercure_config:/config
    networks:
      - symfony

volumes:
  cache:
  logs:
  db_data:
  mercure_data:
  mercure_config:
  static_public:

networks:
  symfony:
    driver: bridge
