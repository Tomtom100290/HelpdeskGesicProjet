; Configuration OPcache pour la production

opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000

; En prod, le code ne change pas apres deploiement :
; on desactive la verification des timestamps pour la perf.
; -> Il faudra redemarrer php-fpm (ou vider le cache) a chaque deploiement.
opcache.validate_timestamps=1

; Preload optionnel : decommenter si tu utilises un fichier de preload Symfony
; opcache.preload=/var/www/html/config/preload.php
; opcache.preload_user=www-data