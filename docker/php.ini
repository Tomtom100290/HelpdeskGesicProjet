; Config PHP pour l'application helpdesk (prod)

memory_limit=256M

; Pieces jointes des tickets (adapter selon tes besoins reels)
upload_max_filesize=20M
post_max_size=20M
max_file_uploads=10

date.timezone=Europe/Paris

; Erreurs : on log mais on n'affiche rien a l'ecran en prod
display_errors=Off
log_errors=On

realpath_cache_size=4096K
realpath_cache_ttl=600